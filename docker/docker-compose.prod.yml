version: "3.9"

services:
  api:
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      APP_ENV: production
    deploy:
      replicas: ${API_REPLICAS:-2}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celery_worker:
    deploy:
      replicas: ${WORKER_REPLICAS:-2}

  nginx:
    image: nginx:1.25-alpine
    container_name: marketing_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - marketing_network

networks:
  marketing_network:
    driver: bridge
