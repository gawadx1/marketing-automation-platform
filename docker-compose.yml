version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-deploy: &default-deploy
  restart: unless-stopped
  logging: *default-logging

services:
  postgres:
    image: postgres:16-alpine
    container_name: marketing_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-marketing_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marketing_pass}
      POSTGRES_DB: ${POSTGRES_DB:-marketing_platform}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marketing_user} -d ${POSTGRES_DB:-marketing_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging: *default-logging
    networks:
      - marketing_network

  redis:
    image: redis:7-alpine
    container_name: marketing_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M
    logging: *default-logging
    networks:
      - marketing_network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: marketing-platform-api:latest
    container_name: marketing_api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      APP_ENV: ${APP_ENV:-production}
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging
    networks:
      - marketing_network

  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: marketing-platform-worker:latest
    container_name: marketing_celery_worker
    restart: unless-stopped
    command: celery -A app.core.celery_app.celery_app worker --loglevel=${LOG_LEVEL:-INFO} --concurrency=${CELERY_CONCURRENCY:-4} --max-tasks-per-child=200 --prefetch-multiplier=1 --without-heartbeat --without-gossip --without-mingle
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging: *default-logging
    networks:
      - marketing_network

  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: marketing-platform-beat:latest
    container_name: marketing_celery_beat
    restart: unless-stopped
    command: celery -A app.core.celery_app.celery_app beat --loglevel=${LOG_LEVEL:-INFO} --pidfile=/tmp/celerybeat.pid --schedule=/tmp/celerybeat-schedule
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging: *default-logging
    networks:
      - marketing_network

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: marketing-platform-scheduler:latest
    container_name: marketing_scheduler
    restart: unless-stopped
    entrypoint: ["python", "/app/docker/run_scheduler.py"]
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging: *default-logging
    networks:
      - marketing_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  marketing_network:
    driver: bridge
